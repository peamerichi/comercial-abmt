<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#08090d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ABMT Comercial</title>
    <link rel="stylesheet" href="/static/css/style.css?v=49">
    <link rel="manifest" href="/manifest.json">
</head>
<body>
<div id="app"></div>

<script src="/static/js/app.js?v=49"></script>
<script src="/static/js/forms.js?v=49"></script>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').then(reg => {
            // Check for SW updates every 5 minutes
            setInterval(() => reg.update(), 5 * 60 * 1000);
            reg.addEventListener('updatefound', () => {
                const newSW = reg.installing;
                newSW.addEventListener('statechange', () => {
                    if (newSW.state === 'activated' && navigator.serviceWorker.controller) {
                        // New version available — show banner
                        const banner = document.createElement('div');
                        banner.id = 'sw-update-banner';
                        banner.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#1a73e8;color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;z-index:9999;font-size:14px;box-shadow:0 -2px 8px rgba(0,0,0,.2)';
                        banner.innerHTML = '<span>Nova versão disponível!</span><button onclick="location.reload()" style="background:#fff;color:#1a73e8;border:none;padding:6px 16px;border-radius:6px;font-weight:600;cursor:pointer">Atualizar</button>';
                        document.body.appendChild(banner);
                    }
                });
            });
        });
    }
</script>
</body>
</html>
