<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0d14">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ABMT Comercial</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css?v=53">
    <link rel="stylesheet" href="/static/css/theme-2026.css?v=2">
    <link rel="manifest" href="/manifest.json">
</head>
<body>
<div id="app">
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;background:#0a0d14">
        <div style="font-size:30px;font-weight:700;font-family:'Space Grotesk',sans-serif;color:#4f8cff">ABMT</div>
        <div style="width:32px;height:32px;border:3px solid rgba(79,140,255,.2);border-top-color:#4f8cff;border-radius:50%;animation:spin 0.8s linear infinite"></div>
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
</div>

<script src="/static/js/app.js?v=53"></script>
<script src="/static/js/forms.js?v=53"></script>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').then(reg => {
            setInterval(() => reg.update(), 5 * 60 * 1000);
            reg.addEventListener('updatefound', () => {
                const newSW = reg.installing;
                newSW.addEventListener('statechange', () => {
                    if (newSW.state === 'activated' && navigator.serviceWorker.controller) {
                        const banner = document.createElement('div');
                        banner.id = 'sw-update-banner';
                        banner.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#1a73e8;color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;z-index:9999;font-size:14px;box-shadow:0 -2px 8px rgba(0,0,0,.2)';
                        banner.innerHTML = '<span>Nova versão disponível!</span><button onclick="location.reload()" style="background:#fff;color:#1a73e8;border:none;padding:6px 16px;border-radius:6px;font-weight:600;cursor:pointer">Atualizar</button>';
                        document.body.appendChild(banner);
                    }
                });
            });
        });
    }
</script>
</body>
</html>
